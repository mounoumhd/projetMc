    <main>
        <div class="contact-info"></div>
        <section id="contact">
            <h2>contactez-nous</h2>
            <form class="contact-form">
             <label for="name">nom:</label>
             <input type="text" id="name" name="name" required>
             <label for="email">email:</label>
             <input type="email" id="email" name="email" required>
             <label for="message">message:</label>
             <textarea name="message" id="message" rows="5" required></textarea>
             <label >Vous etes :</label>
             <div class="radio-groupe">
                <input type="radio" id="dentiste" name="type" value="dentiste" checked>
                <label for="dentiste">Dentiste</label>
                 <input type="radio" id="autres" name="type" value="autres" >
                <label for="autres">Autres</label>
              </div>
             <label class="checkbox">
                <input type="checkbox" required>
                jaccepte que mes donnees soient utilisees pour me recontacter
             </label>
             <button type="submit">envoyer</button>
            </form>
        </section>
